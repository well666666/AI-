<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企業 AI 智慧知識庫</title>
  <!-- 引入 Tailwind CSS (CDN 版本，免編譯) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Lucide Icons (CDN 版本) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- 引入自訂 CSS -->
  <link rel="stylesheet" href="./style.css">
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 font-sans selection:bg-[#1A237E] selection:text-white">
  
  <!-- Header -->
  <header class="border-b border-gray-200 bg-white/80 backdrop-blur-md sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded bg-[#1A237E] flex items-center justify-center shadow-md">
          <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
        </div>
        <h1 class="text-xl font-bold text-gray-900 tracking-wide">企業 AI 智慧知識庫</h1>
      </div>
      <div class="flex items-center gap-4 text-sm text-gray-600">
        <span>Hi, 員工</span>
        <div class="w-8 h-8 rounded-full bg-gray-200 border border-gray-300"></div>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    
    <!-- Search Section -->
    <div class="max-w-3xl mx-auto text-center mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-6 tracking-tight">您今天需要什麼協助？ <span class="text-2xl md:text-3xl text-gray-500 font-medium block mt-2 md:inline md:mt-0 md:ml-2">How can I help you today?</span></h2>
      
      <form id="searchForm" class="relative group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <i data-lucide="search" class="h-6 w-6 text-gray-400 group-focus-within:text-[#1A237E] transition-colors"></i>
        </div>
        <input type="text" id="searchInput" class="block w-full pl-12 pr-32 py-4 bg-white border border-gray-300 rounded-2xl text-lg text-gray-900 placeholder-gray-400 focus:ring-2 focus:ring-[#1A237E] focus:border-transparent transition-all shadow-sm hover:shadow-md" placeholder="例如：請假怎麼請？ / e.g., How to apply for leave?">
        <button type="submit" id="searchBtn" disabled class="absolute inset-y-2 right-2 px-6 bg-[#1A237E] hover:bg-[#283593] text-white rounded-xl font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 shadow-sm">
          <div id="searchBtnSpinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          <span id="searchBtnText">AI 搜尋 / Search</span>
        </button>
      </form>

      <!-- AI Search Result Area -->
      <div id="searchResultArea" class="mt-6 text-left hidden opacity-0 transition-opacity duration-500"></div>
    </div>

    <!-- Categories -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      
      <!-- Category 1 -->
      <div onclick="openCategory('rules')" class="group bg-white border border-gray-200 hover:border-[#1A237E] rounded-2xl p-8 transition-all hover:shadow-lg cursor-pointer relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-50/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <div class="relative z-10">
          <div class="w-14 h-14 bg-blue-50 text-[#1A237E] rounded-xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
            <i data-lucide="book-open" class="w-7 h-7"></i>
          </div>
          <h3 class="text-xl font-bold text-gray-900 mb-3">規章制度</h3>
          <p class="text-gray-500 text-sm leading-relaxed mb-6">查詢公司各項管理辦法、員工手冊、獎懲規定等正式規範文件。</p>
          <div class="flex items-center text-sm font-medium text-[#1A237E] group-hover:text-blue-800 transition-colors">
            瀏覽規章 <i data-lucide="chevron-right" class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform"></i>
          </div>
        </div>
      </div>

      <!-- Category 2 -->
      <div onclick="openCategory('processes')" class="group bg-white border border-gray-200 hover:border-[#1A237E] rounded-2xl p-8 transition-all hover:shadow-lg cursor-pointer relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-purple-50/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <div class="relative z-10">
          <div class="w-14 h-14 bg-purple-50 text-purple-700 rounded-xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
            <i data-lucide="git-merge" class="w-7 h-7"></i>
          </div>
          <h3 class="text-xl font-bold text-gray-900 mb-3">作業流程</h3>
          <p class="text-gray-500 text-sm leading-relaxed mb-6">了解各部門標準作業程序 (SOP)、跨部門協作指南與申請流程。</p>
          <div class="flex items-center text-sm font-medium text-purple-700 group-hover:text-purple-800 transition-colors">
            瀏覽流程 <i data-lucide="chevron-right" class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform"></i>
          </div>
        </div>
      </div>

      <!-- Category 3 -->
      <div onclick="openCategory('forms')" class="group bg-white border border-gray-200 hover:border-[#1A237E] rounded-2xl p-8 transition-all hover:shadow-lg cursor-pointer relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-green-50/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <div class="relative z-10">
          <div class="w-14 h-14 bg-green-50 text-green-700 rounded-xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
            <i data-lucide="file-text" class="w-7 h-7"></i>
          </div>
          <h3 class="text-xl font-bold text-gray-900 mb-3">表單下載</h3>
          <p class="text-gray-500 text-sm leading-relaxed mb-6">取得各類申請書、報表範本、請假單等常用空白表單檔案。</p>
          <div class="flex items-center text-sm font-medium text-green-700 group-hover:text-green-800 transition-colors">
            下載表單 <i data-lucide="chevron-right" class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform"></i>
          </div>
        </div>
      </div>

    </div>

    <!-- Modal (Floating Window) -->
    <div id="categoryModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeModal()">
      <div id="modalContainer" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-gray-100 flex flex-col max-h-[80vh] transform scale-95 transition-transform duration-300" onclick="event.stopPropagation()">
        
        <!-- Modal Header -->
        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 shrink-0">
          <div class="flex items-center gap-3">
            <button id="modalBackBtn" onclick="goBackToCategory()" class="hidden p-1.5 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors shadow-sm">
              <i data-lucide="chevron-left" class="w-5 h-5 text-gray-600"></i>
            </button>
            <h3 class="text-xl font-bold text-gray-900 flex items-center gap-2">
              <span id="modalTitleIcon"></span>
              <span id="modalTitleText" class="truncate max-w-[250px]"></span>
            </h3>
          </div>
          <button onclick="closeModal()" class="p-2 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-full transition-colors">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>

        <!-- Modal Body -->
        <div id="modalBody" class="p-3 overflow-y-auto flex-1">
          <!-- Content will be injected here by JS -->
        </div>

      </div>
    </div>

  </main>

  <!-- 引入自訂 JS -->
  <script src="./script.js"></script>
</body>
</html>
